name: Publish Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish assets for
        required: true
        type: string
      mark_latest:
        description: Mark this release as latest after uploading assets
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event.release.tag_name || inputs.tag_name }}
  cancel-in-progress: false

jobs:
  resolve-release:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      mark_latest: ${{ steps.resolve.outputs.mark_latest }}
    steps:
      - name: Resolve tag and publish mode
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "mark_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "mark_latest=${{ inputs.mark_latest }}" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    name: Build release binaries (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    needs:
      - resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: linux-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: windows-arm64
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.tag_name }}
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --bin lpass --target ${{ matrix.target }}

      - name: Package artifact
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/lpass" "dist/lpass-${{ matrix.asset_name }}"
          tar -C dist -czf "dist/lpass-${{ matrix.asset_name }}.tar.gz" "lpass-${{ matrix.asset_name }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/lpass.exe" "dist/lpass-${{ matrix.asset_name }}.exe"
          Compress-Archive -Path "dist/lpass-${{ matrix.asset_name }}.exe" -DestinationPath "dist/lpass-${{ matrix.asset_name }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish-release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - build-release
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.resolve-release.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --clobber

      - name: Mark release as latest
        if: needs.resolve-release.outputs.mark_latest == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.resolve-release.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --latest
