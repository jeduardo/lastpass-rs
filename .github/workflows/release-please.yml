name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    name: Build release binaries (${{ matrix.asset_name }})
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    needs:
      - release-please
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: linux-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: windows-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --bin lpass --target ${{ matrix.target }}

      - name: Package artifact
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/lpass" "dist/lpass-${{ matrix.asset_name }}"
          tar -C dist -czf "dist/lpass-${{ matrix.asset_name }}.tar.gz" "lpass-${{ matrix.asset_name }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/lpass.exe" "dist/lpass-${{ matrix.asset_name }}.exe"
          Compress-Archive -Path "dist/lpass-${{ matrix.asset_name }}.exe" -DestinationPath "dist/lpass-${{ matrix.asset_name }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish-release-assets:
    name: Upload release assets
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build-release
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Resolve created release tag
        id: release-tag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          TAG_NAME="$(gh api "repos/${GITHUB_REPOSITORY}/releases" --jq '.[] | select(.target_commitish == "'"${GITHUB_SHA}"'") | .tag_name' | head -n1)"
          if [ -z "$TAG_NAME" ]; then
            echo "Unable to find release tag for commit ${GITHUB_SHA}" >&2
            exit 1
          fi
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TAG_NAME: ${{ steps.release-tag.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --clobber

      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TAG_NAME: ${{ steps.release-tag.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --latest
